<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorgm GitHub Pages Repositories</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background-color: darkgray; color: whitesmoke }
        ul { list-style-type: none; padding: 0; }
        li { margin: 0.5rem 0; border: 1px solid whitesmoke; padding: 1rem; border-radius: 5px; }
        a { text-decoration: none; color: whitesmoke;  }
        li a {display:block; width:100%; height:100%;}
        li:has(a:hover) { background-color: #0366d6; color: #fff; transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body>
    <h1>GitHub Pages Repositories for <a href="https://github.com/sorgm" target="_blank">sorgm</a></h1>
    <p>Fetching repository list...</p>
    <ul id="repo-list"></ul>

    <script>
        async function loadRepos(owner = 'sorgm') {
            try {
                const response = await fetch(`https://api.github.com/users/${owner}/repos`);
                if (!response.ok) throw new Error('Network response was not ok');
                const repos = await response.json();
                const pagesRepos = repos
                    .filter(r => r.has_pages && r.name!=`${owner}.github.io`)
                    .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                const list = document.getElementById('repo-list');
                if (pagesRepos.length === 0) {
                    list.innerHTML = '<li>No repositories with GitHub Pages found.</li>';
                } else {
                    pagesRepos.forEach(repo => {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = `https://${repo.owner.login}.github.io/${repo.name}`;
                        a.target = '_blank';
                        a.innerHTML = '<b>' + repo.name + '</b><br/>' + repo.description;
                        li.appendChild(a);
                        list.appendChild(li);
                    });
                }
                document.querySelector('p').remove();
            } catch (err) {
                document.querySelector('p').textContent = 'Failed to load repositories.';
                console.error(err);
            }
        }
        loadRepos();
    </script>
</body>
</html>
